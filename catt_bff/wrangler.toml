name = "ghc"
main = "src/index.ts"
compatibility_date = "2025-01-01"
workers_dev = true

routes = [
  { pattern = "ghc.manojbaba.com", custom_domain = true }
]

[observability]

[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = true

[[durable_objects.bindings]]
name = "DEVICE_QUEUE"
class_name = "DeviceQueue"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["DeviceQueue"]

[[kv_namespaces]]
binding = "CALLER_KV"
id = "864ec8d98dec4b1da7f7f9c9cf1171b3"
preview_id = "3599bf2eb7a94e3394a3f9ecfe0427b9"

[ai]
binding = "CATT_AI"

[triggers]
crons = ["3 3 * * *"]

# Secrets (set via `wrangler secret put`):
# CATT_BACKEND_URL
# CATT_BACKEND_SECRET
# REDIRECT_URL
# SLACK_SIGNING_SECRET
# TELEGRAM_ALLOWED_CHAT_IDS
# TELEGRAM_BOT_TOKEN
# TELEGRAM_SECRET_TOKEN
# YOUTUBE_API_KEY
