name: catt-backend

concurrency:
  group: ci
  cancel-in-progress: false

on:
  workflow_dispatch:
  schedule:
    - cron: "5 5 * * 0" # every Sunday at 5:05 AM
  pull_request:
    paths: [ catt_backend/** ]
  push:
    branches: [ main ]
    paths: [ catt_backend/** ]

env:
  IMAGE_NAME: "catt"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: catt_backend
        run: pip install -r requirements.txt pytest

      - name: Run tests
        working-directory: catt_backend
        run: pytest tests/

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push head
        if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main')
        uses: docker/build-push-action@v7
        with:
          context: ./catt_backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:head
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push latest
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v7
        with:
          context: ./catt_backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
