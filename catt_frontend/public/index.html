<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>catt</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <h1>catt</h1>
      <form id="login-form" novalidate>
        <label for="pin">PIN</label>
        <input id="pin" name="pin" type="password" inputmode="numeric"
               pattern="\d{6}" maxlength="6" autocomplete="current-password"
               placeholder="••••••" required autofocus>
      </form>
      <p class="error-msg" id="error" aria-live="polite"></p>
      <button class="btn btn-full" id="submit-btn" type="submit" form="login-form">Sign in</button>
    </div>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const pinInput = document.getElementById('pin');
    const errorEl = document.getElementById('error');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.textContent = '';
      const pin = pinInput.value.trim();
      if (!/^\d{6}$/.test(pin)) {
        errorEl.textContent = 'Enter a 6-digit PIN.';
        return;
      }
      submitBtn.disabled = true;
      submitBtn.classList.add('loading');
      try {
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pin }),
          redirect: 'manual',
        });
        if (res.status === 302 || res.status === 0) {
          window.location.href = '/app';
        } else if (res.status === 401) {
          errorEl.textContent = 'Incorrect PIN. Try again.';
          pinInput.value = '';
          pinInput.focus();
        } else {
          errorEl.textContent = 'Something went wrong. Try again.';
        }
      } catch {
        errorEl.textContent = 'Network error. Try again.';
      } finally {
        submitBtn.disabled = false;
        submitBtn.classList.remove('loading');
      }
    });
  </script>
</body>
</html>
